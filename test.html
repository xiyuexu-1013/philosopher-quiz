            display: flex; justify-content: center; align-items: center; min-height: 100vh;

        #app { width: 100%; max-width: 600px; padding: 20px; }
        .card { background: #ffffff; padding: 40px; border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); text-align: center; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .title { font-size: 26px; font-weight: 600; margin-bottom: 12px; letter-spacing: 0.5px; }
        .subtitle { color: var(--text-secondary); font-size: 15px; margin-bottom: 30px; }
        
        .quiz-header { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; font-weight: 500; letter-spacing: 1px; }
        .question-text { font-size: 19px; font-weight: 600; margin-bottom: 32px; text-align: left; line-height: 1.5; }
        
        .options-container { display: flex; flex-direction: column; gap: 14px; }
        .option-btn { background: #ffffff; border: 1px solid var(--border-color); padding: 18px 24px; border-radius: 12px; font-size: 16px; text-align: left; cursor: pointer; transition: all 0.2s ease; line-height: 1.4; color: var(--text-primary); }
        .option-btn:hover { background: var(--hover-color); border-color: #ccc; transform: translateY(-1px); }
        
        .primary-btn { background: var(--accent-color); color: #ffffff; border: none; padding: 15px 36px; border-radius: 30px; font-size: 16px; font-weight: 500; cursor: pointer; transition: 0.2s; margin-top: 20px; }
        .primary-btn:hover { opacity: 0.85; transform: scale(1.02); }
        
        .result-tag { display: inline-block; padding: 6px 14px; background: #f0f0f0; border-radius: 20px; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 20px; }
        .quote { font-size: 18px; font-style: italic; color: #333; margin: 25px 0; text-align: center; font-weight: 500; }
        .quote::before { content: "“"; font-size: 24px; color: #999; }
        .quote::after { content: "”"; font-size: 24px; color: #999; }
        
        .chart-container { position: relative; width: 100%; max-width: 400px; margin: 0 auto 30px auto; aspect-ratio: 1; }
        
        .meta-info { display: flex; justify-content: space-around; background: #fafafa; padding: 20px; border-radius: 12px; font-size: 14px; margin-bottom: 30px; border: 1px solid var(--border-color); }

        .meta-label { color: var(--text-secondary); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .meta-value { font-weight: 600; color: var(--accent-color); }
    </style>
</head>

// ==========================================
// 3. 核心算法：数学归一化与余弦计算
// ==========================================
const DIMENSION_KEYS = ['D1', 'D2', 'D3', 'D4', 'D5', 'D6', 'D7', 'D8'];

// 计算用户初始累加向量
function calculateRawVector(answers) {
    let raw = { D1: 0, D2: 0, D3: 0, D4: 0, D5: 0, D6: 0, D7: 0, D8: 0 };
    for (let qId in answers) {
        let choice = answers[qId];
        let mapping = QUESTION_MAPPING[qId]?.[choice];
        if (mapping) {
            for (let dim in mapping) raw[dim] += mapping[dim];
        }
    }
    return raw;
}

// 归一化：将任意区间的得分映射到 [0, 10] (防止负数破坏余弦计算，并与目标空间对齐)
function normalizeVector(rawVector) {
    let normalized = {};
    let values = Object.values(rawVector);
    let minScore = Math.min(...values);
    let maxScore = Math.max(...values);
    
    for (let dim of DIMENSION_KEYS) {
        if (maxScore === minScore) {
            normalized[dim] = 5; // 如果极度平均，赋中值
        } else {
            // 将分数线性映射到 0~10 的雷达刻度
            normalized[dim] = ((rawVector[dim] - minScore) / (maxScore - minScore)) * 10;
        }
    }
    return normalized;
}

// 标准余弦相似度计算 (加权计算)
function cosineSimilarity(vecA, vecB) {
    let dot = 0, normA = 0, normB = 0;
    // 保留细微权重倾斜，增强匹配准确度
    const weights = { D1: 1.2, D2: 1.0, D3: 0.9, D4: 1.2, D5: 1.0, D6: 1.1, D7: 1.0, D8: 0.9 };
    
    for (let d of DIMENSION_KEYS) {
        let w = weights[d];
        dot += w * vecA[d] * vecB[d];
        normA += w * Math.pow(vecA[d], 2);
        normB += w * Math.pow(vecB[d], 2);
    }
    if (normA === 0 || normB === 0) return 0;
    return dot / (Math.sqrt(normA) * Math.sqrt(normB));
}

function getFinalResult(answers) {
    let rawVector = calculateRawVector(answers);
    let finalUserVector = normalizeVector(rawVector);
    let scores = [];
    
    for (let name in PHILOSOPHER_VECTORS) {
        let sim = cosineSimilarity(finalUserVector, PHILOSOPHER_VECTORS[name]);
        scores.push({ name: name, score: sim });
    }
    scores.sort((a, b) => b.score - a.score);
    return {
        bestMatch: scores[0],
        userVector: finalUserVector
    };
}

const appDiv = document.getElementById('app');
let currentStep = 'welcome';
let currentQuestionIndex = 0;
let userAnswers = {};
let myChart = null;

function render() {
    if (currentStep === 'welcome') {
        appDiv.innerHTML = `
            <div class="card">
                <h1 class="title">50位思想家：寻找你的精神镜像</h1>
                <p class="subtitle">基于多维余弦映射算法，建立你的思想坐标系。</p>
                <button class="primary-btn" onclick="startQuiz()">进入测试</button>
            </div>
        `;
    } else if (currentStep === 'quiz') {
        let q = QUESTIONS[currentQuestionIndex];
        let optionsHtml = q.options.map(opt => `
            <button class="option-btn" onclick="selectAnswer('${q.id}', '${opt.key}')">${opt.text}</button>
        `).join('');
        
        appDiv.innerHTML = `
            <div class="card">
                <div class="quiz-header">
                    <span>${q.section}</span>
                    <span>${currentQuestionIndex + 1} / ${QUESTIONS.length}</span>
                </div>
                <h2 class="question-text">${q.text}</h2>
                <div class="options-container">${optionsHtml}</div>
            </div>
        `;
    } else if (currentStep === 'result') {
        let resultData = getFinalResult(userAnswers);
        let match = resultData.bestMatch;
        let vector = resultData.userVector;
        let meta = PHILOSOPHER_META[match.name];
        let similarity = (match.score * 100).toFixed(1);
        
        appDiv.innerHTML = `
            <div class="card">
                <div class="result-tag">灵魂匹配度：${similarity}%</div>
                <h1 class="title">${match.name}</h1>
                <p class="subtitle" style="margin-bottom: 10px;">「 ${meta.tag} 」</p>
                
                <div class="quote">${meta.quote}</div>
                
                <div class="meta-info">
                    <div class="meta-item"><span class="meta-label">代表作</span><span class="meta-value">${meta.work}</span></div>
                </div>

                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>
                
                <button class="primary-btn" onclick="restart()">重新测算</button>
            </div>
        `;
        
        // 渲染雷达图
        setTimeout(() => drawRadarChart(vector), 50);
    }
}

function drawRadarChart(vector) {
    const ctx = document.getElementById('radarChart').getContext('2d');
    if (myChart) myChart.destroy();
    
    myChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['理性(D1)', '理想(D2)', '行动(D3)', '个体(D4)', '情感(D5)', '批判(D6)', '存在(D7)', '共情(D8)'],
            datasets: [{
                label: '你的思想坐标',
                data: [vector.D1, vector.D2, vector.D3, vector.D4, vector.D5, vector.D6, vector.D7, vector.D8],
                backgroundColor: 'rgba(34, 34, 34, 0.1)',
                borderColor: 'rgba(34, 34, 34, 1)',
                pointBackgroundColor: 'rgba(34, 34, 34, 1)',
                pointBorderColor: '#fff',
                pointHoverBackgroundColor: '#fff',
                pointHoverBorderColor: 'rgba(34, 34, 34, 1)',
                borderWidth: 2,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                r: {
                    angleLines: { color: 'rgba(0, 0, 0, 0.1)' },
                    grid: { color: 'rgba(0, 0, 0, 0.1)' },
                    pointLabels: { font: { size: 12, family: 'Helvetica Neue' }, color: '#555' },
                    ticks: { display: false, min: 0, max: 10, stepSize: 2 }
                }
            },
            plugins: {
                legend: { display: false },
                tooltip: { backgroundColor: 'rgba(0,0,0,0.8)', padding: 10 }
            }
        }
    });
}

function startQuiz() {
    currentQuestionIndex = 0;
    userAnswers = {};
    currentStep = 'quiz';
    render();
}

function selectAnswer(qId, choiceKey) {
    userAnswers[qId] = choiceKey;
    if (currentQuestionIndex < QUESTIONS.length - 1) {
        currentQuestionIndex++;
        render();
    } else {
        currentStep = 'result';
        render();
    }
}

function restart() {
    currentStep = 'welcome';
    render();
}

// 初始加载
render();
