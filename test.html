// --- 核心算法 ---
const DIMENSION_WEIGHTS = { D1: 1.2, D2: 1.0, D3: 0.9, D4: 1.2, D5: 1.0, D6: 1.1, D7: 1.0, D8: 0.9 };
const DIMENSION_KEYS = ['D1', 'D2', 'D3', 'D4', 'D5', 'D6', 'D7', 'D8'];

function calculateUserVector(answers) {
    let userVector = { D1: 0, D2: 0, D3: 0, D4: 0, D5: 0, D6: 0, D7: 0, D8: 0 };
    for (let qId in answers) {
        let choice = answers[qId];
        let mapping = QUESTION_MAPPING[qId]?.[choice];
        if (mapping) {
            for (let dim in mapping) userVector[dim] += mapping[dim];
        }
    }
    for (let dim of DIMENSION_KEYS) {
        userVector[dim] = Math.min(10, (userVector[dim] / 8) * 10); 
    }
    return userVector;
}

function cosineSimilarity(vecA, vecB) {
    let dot = 0, normA = 0, normB = 0;
    for (let d of DIMENSION_KEYS) {
        let w = DIMENSION_WEIGHTS[d];
        dot += w * vecA[d] * vecB[d];
        normA += w * Math.pow(vecA[d], 2);
        normB += w * Math.pow(vecB[d], 2);
    }
    if (normA === 0 || normB === 0) return 0;
    return dot / (Math.sqrt(normA) * Math.sqrt(normB));
}

function getFinalResult(answers) {
    let userVector = calculateUserVector(answers);
    let scores = [];
    for (let name in PHILOSOPHER_VECTORS) {
        scores.push({ name: name, score: cosineSimilarity(userVector, PHILOSOPHER_VECTORS[name]) });
    }
    scores.sort((a, b) => b.score - a.score);
    return scores[0];
}

const appDiv = document.getElementById('app');
let currentStep = 'welcome';
let currentQuestionIndex = 0;
let userAnswers = {};

function render() {
    if (currentStep === 'welcome') {

            <div class="card">

                <button class="primary-btn" onclick="startQuiz()">开始探索</button>
            </div>
        `;
    } else if (currentStep === 'quiz') {
        let q = QUESTIONS[currentQuestionIndex];
        let optionsHtml = q.options.map(opt => `
            <button class="option-btn" onclick="selectAnswer('${q.id}', '${opt.key}')">${opt.text}</button>
        `).join('');
        
        appDiv.innerHTML = `
            <div class="card">
                <div class="quiz-header">
                    <span>${q.section}</span>
                    <span>${currentQuestionIndex + 1} / ${QUESTIONS.length}</span>
                </div>
                <h2 class="question-text">${q.text}</h2>
                <div class="options-container">${optionsHtml}</div>
            </div>
        `;
    } else if (currentStep === 'result') {
        let result = getFinalResult(userAnswers);
        let meta = PHILOSOPHER_META[result.name];
        let similarity = (result.score * 100).toFixed(1);
        
        appDiv.innerHTML = `
            <div class="card">
                <h1 class="title">${result.name}</h1>
                <p style="color: #666; margin-bottom: 20px;">「 ${meta.tag} 」</p>
                <div class="quote">"${meta.quote}"</div>
                <div class="meta-info">
                    <p><strong>代表作：</strong> ${meta.work}</p>
                    <p><strong>匹配度：</strong> ${similarity}%</p>
                </div>
                <button class="primary-btn" onclick="restart()">重新测试</button>
            </div>
        `;
    }
}

function startQuiz() {
    currentQuestionIndex = 0;
    userAnswers = {};
    currentStep = 'quiz';
    render();
}

function selectAnswer(qId, choiceKey) {
    userAnswers[qId] = choiceKey;
    if (currentQuestionIndex < QUESTIONS.length - 1) {
        currentQuestionIndex++;
        render();
    } else {
        currentStep = 'result';
        render();
    }
}

function restart() {
    currentStep = 'welcome';
    render();
}

// 初始渲染
