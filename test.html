<style>
  :root { --bg: #1a1a1a; --text: #f0f0f0; --card: rgba(255,255,255,0.08); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background-color: var(--bg); color: var(--text);
    min-height: 100vh; transition: background-color 1.5s ease;
    overflow-x: hidden; line-height: 1.6;
  }
  .container { max-width: 640px; margin: 0 auto; padding: 40px 20px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
  
  .card { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); border-radius: 24px; padding: 32px 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: fadeIn 0.8s ease; }
  .title { font-size: 26px; font-weight: 300; letter-spacing: 3px; text-align: center; margin-bottom: 12px; }
  .subtitle { font-size: 14px; color: #aaa; text-align: center; margin-bottom: 32px; }
  
  .btn { width: 100%; padding: 16px; font-size: 16px; color: #fff; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 50px; cursor: pointer; transition: all 0.3s; letter-spacing: 2px; margin-top: 20px; }
  .btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
  
  .quiz-header { display: flex; justify-content: space-between; font-size: 13px; color: #aaa; margin-bottom: 20px; letter-spacing: 1px; }
  .question-text { font-size: 18px; font-weight: 400; margin-bottom: 24px; line-height: 1.5; }
  .option-btn { width: 100%; padding: 16px; margin-bottom: 12px; text-align: left; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #e0e0e0; cursor: pointer; transition: all 0.2s; font-size: 15px; }
  .option-btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
  
  .result-tag { text-align: center; font-size: 13px; color: #aaa; letter-spacing: 2px; margin-bottom: 8px; }
  .match-score { text-align: center; font-size: 36px; font-weight: 300; margin-bottom: 8px; background: linear-gradient(135deg, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .thinker-name { text-align: center; font-size: 32px; font-weight: 300; letter-spacing: 4px; margin-bottom: 4px; }
  .thinker-tag { text-align: center; font-size: 14px; color: #ccc; margin-bottom: 20px; }
  .color-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.2); }
  
  .quote { font-size: 18px; font-style: italic; text-align: center; line-height: 1.6; color: #fff; font-weight: 300; margin: 24px 0; padding: 20px; border-left: 3px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.2); border-radius: 0 12px 12px 0; }
  
  .section { margin-bottom: 24px; }
  .section-title { font-size: 13px; color: #aaa; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; border-left: 3px solid rgba(255,255,255,0.5); padding-left: 10px; }
  .section-content { font-size: 15px; line-height: 1.8; color: #e0e0e0; }
  
  .chart-container { position: relative; height: 300px; width: 100%; margin: 30px 0; }
  
  .list-item { margin-bottom: 10px; font-size: 14px; line-height: 1.6; color: #ddd; padding-left: 16px; position: relative; }
  .list-item::before { content: "•"; position: absolute; left: 0; color: #fff; }
  
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  "康德": { tag: "极度自律 · 理性至上", quote: "头顶的星空，心中的道德律。", work: "《纯粹理性批判》", color: "#3D2A54", colorName: "暮紫", career: "适合法律、学术、审计、数据。你的价值是“校准”。", soul: "依赖秩序，为不被混沌吞没。信理性是可靠工具，也知有边界。活在自律中，出于尊重。", weakness: "太信“应该”，忘了“实际”。世界不按逻辑运行时深刻失望。易把“自律”误当“自虐”。", prescription: ["允许偶尔“不讲道理”享受。", "道德律令从“必须”调为“可以”。", "星空美，草地也有温度。"], books: ["《纯粹理性批判》", "《小王子》"] },
  "尼采": { tag: "反叛者 · 生命力旺盛", quote: "那些杀不死我的，使我更强大。", work: "《查拉图斯特拉如是说》", color: "#F4C430", colorName: "雷霆黄", career: "适合创业、艺术、思想写作。你是“重估一切价值”的人。", soul: "体内有团火。对平庸生理性反感。信生命本质是“权力意志”——成为自己最极致版本。", weakness: "强大建立在危险假设上：永远有力量面对打击。当某些东西真“杀死”你时，可能没那么强大。", prescription: ["改成“有些东西杀不死我，但让我休息”。", "为“脆弱”保留房间。", "他抱马时是心痛的人。"], books: ["《查拉图斯特拉如是说》", "《当尼采哭泣》"] },
  "叔本华": { tag: "诚实悲观 · 洞察极深", quote: "人生如钟摆，在痛苦与无聊之间。", work: "《人生的智慧》", color: "#B0B0B0", colorName: "薄雾灰", career: "适合哲学、心理、艺术批评。你是“看透却依然在场”的角色。", soul: "目光带层薄灰。不信“未来会更好”。早看穿追逐欲望是痛苦，满足是无聊。只是早接受“这就是人生”。", weakness: "“看透”少了很多失望，也少了很多惊喜。提前知道结果，不愿投入过程。", prescription: ["用艺术调节悲观。", "尝试一次“非理性”行动。", "悲观主义者也需要活物来爱。"], books: ["《作为意志和表象的世界》", "《人生的智慧》"] },
  "海德格尔": { tag: "存在敏感 · 常常“出神”", quote: "人是被抛入世界的。", work: "《存在与时间》", color: "#2D4F3C", colorName: "森林绿", career: "适合哲学、存在心理、文学。需允许你停下问“为什么”的空间。", soul: "从小隐隐觉得“不对劲”。无法理所当然活着，总追问“活着意味什么”。直面“存在”本身。", weakness: "“向死而生”是诚实，但也难“活在当下”。总在观看自己活着，而非真正在活。", prescription: ["把“存在追问”放一边，今天只是“在”。", "做“不需反思”的事。", "他也感受林间的风。"], books: ["《存在与时间》", "《当尼采哭泣》"] },
  "萨特": { tag: "极度自由 · 为自己负责", quote: "人是自由的，人注定自由。", work: "《存在与虚无》", color: "#C41E3A", colorName: "存在红", career: "适合创业、创作、自由职业。需能让你“说了算”的空间。", soul: "拒绝任何“借口”。信你是什么，是选择的结果。自由是荣耀也是负担。每次选择都感到重量。", weakness: "自由是“孤独的自由”。拒绝托付、依赖。把自己活成孤岛。自由以“被抛弃”为代价。", prescription: ["尝试一次“不自由”的选择。", "区分“自由”和“孤立”。", "自由的重量也是可以分享的。"], books: ["《存在与虚无》", "《西西弗斯神话》"] },
  "加缪": { tag: "觉醒者 · 坚韧不放弃", quote: "我们必须想象西西弗斯是幸福的。", work: "《西西弗斯神话》", color: "#1A6B8A", colorName: "地中海蓝", career: "适合“明知难但依然在做”的领域。你是“荒谬英雄”。", soul: "“明知无望但依然前行”。看见荒谬，但选择继续推石头。反抗不是胜利，是“继续”本身。", weakness: "“荒谬英雄”人设很酷，但很累。一直推石头，忘了问：可不可以休息一下？", prescription: ["给石头放一天假。", "区分“反抗”和“执念”。", "答案不是死亡，是活着。"], books: ["《西西弗斯神话》", "《局外人》"] },
  "福柯": { tag: "批判者 · 拆穿伪装", quote: "知识即权力。", work: "《规训与惩罚》", color: "#D0D0D0", colorName: "镜面银", career: "适合学术批判、媒体、法律、社会研究。你是“体制的眼睛”。", soul: "对“理所当然”警惕。追问“谁定义的？为了谁？”信世界是被构建、被权力塑造的。", weakness: "拆穿了一切，住在哪里？不信任何结构，如何安放自己？锋利的刀不能当床睡。", prescription: ["找件“不值得批判”的事让它存在。", "参与具体社群感受归属。", "身体比权力更真实。"], books: ["《规训与惩罚》", "《疯癫与文明》"] },
  "德里达": { tag: "语言敏感 · 优雅的怀疑者", quote: "文本之外，别无他物。", work: "《书写与差异》", color: "linear-gradient(135deg, #ff9a9e, #fad0c4, #a1c4fd)", colorName: "棱镜彩", career: "适合翻译、文化研究、创意写作。你是“意义拆解者”。", soul: "信一切在“被解读”。对“终极真相”优雅怀疑。擅长拆解二元对立，让它们露出裂缝。", weakness: "解构能力让你难“站稳”。总看见另一面，无法果断选择。过度解构让行动不可能。", prescription: ["某些事禁止“解构”，直接说“我信”。", "区分“语言局限”和“存在实在”。", "解构是重新打开可能。"], books: ["《书写与差异》", "《为什么读经典》"] },
  "罗素": { tag: "理性有温度 · 清晰表达者", quote: "三种激情支配了我的一生：爱、知识、同情。", work: "《西方哲学史》", color: "#E8C84A", colorName: "晨光金", career: "适合教育、写作、演讲、社会活动。你是“受欢迎的聪明人”。", soul: "有“温度”的理性主义者。喜欢清晰逻辑，但不冷冰冰。关心苦难，关心爱。头脑和心是连接的。", weakness: "“三种激情”可能让你“太分散”。什么都想关心，可能哪件都没投入足够深。", prescription: ["在“三种激情”里选一个给更多时间。", "允许自己“不关注”某些事。", "带着枷锁舞蹈。"], books: ["《西方哲学史》", "《幸福之路》"] },
  "维特根斯坦": { tag: "极度诚实 · 语言洁癖", quote: "凡不可言说者，必须保持沉默。", work: "《逻辑哲学论》", color: "#F8F8F8", colorName: "沉默白", career: "适合逻辑、编程、哲学、翻译。你是“语言清洁工”。", soul: "对语言有近乎洁癖的诚实。不说没把握的话。沉默不是无话可说，是太在意“准确”。", weakness: "沉默保护了诚实，也错过“不精确但温暖”的时刻。坚持不可言说就沉默，可能把珍贵体验也沉默掉。", prescription: ["尝试一次“不精确的表达”。", "在“沉默”和“试着说”间选后者。", "他度过了美好的一生。"], books: ["《逻辑哲学论》", "《维特根斯坦传》"] },
  "克尔凯郭尔": { tag: "极度内省者 · 焦虑但清醒", quote: "焦虑是自由的眩晕。", work: "《恐惧与颤栗》", color: "#A8A8A8", colorName: "黎明灰", career: "适合文学、存在心理、哲学。你是“内心世界的剧作家”。", soul: "“内心世界的剧作家”。大量内在对话、自我怀疑。对“选择”有疼痛的敏感。焦虑是对“自由”的诚实回应。", weakness: "“无限反思”让你卡住。永远在审视、准备。焦虑是自由的眩晕，但一直眩晕就无法迈出那步。", prescription: ["给每个决定截止时间。", "区分“深思熟虑”和“无限循环”。", "有时候你需要跳。"], books: ["《恐惧与颤栗》", "《致死的疾病》"] },
  "胡塞尔": { tag: "耐心观察 · 回到源头", quote: "回到事物本身。", work: "《逻辑研究》", color: "#E8F0F0", colorName: "透明冰", career: "适合科研、教育、哲学。你是“不带预设的观看者”。", soul: "“悬置判断”的人。不易接受“大家都这么说”，需亲自验证。对“先入为主”有警惕。", weakness: "“回到事物本身”需很多时间。可能因“悬置”花太多时间，错过行动时机。", prescription: ["对不重要决定使用“现成判断”。", "区分“新鲜观看”和“无效固执”。", "还原是方法，非停在原地。"], books: ["《逻辑研究》", "《观看之道》"] },
  "弗洛伊德": { tag: "深挖动机 · 自我探索者", quote: "梦是愿望的满足。", work: "《梦的解析》", color: "#1C2E4A", colorName: "梦夜蓝", career: "适合心理、精神分析、HR、艺术治疗。你是“潜意识翻译者”。", soul: "信一切有“底下原因”。说漏的嘴、梦都不是巧合。对自己有“考古学家式”好奇。", weakness: "“考古学”没终点。易陷入“无限追溯”。有些东西不需挖掘，只需接受。", prescription: ["停止一次“挖掘”，只感受。", "接受“有些冲动没深层原因”。", "有时雪茄只是雪茄。"], books: ["《梦的解析》", "《日常生活的精神病理学》"] },
  "荣格": { tag: "象征敏感 · 原型思维", quote: "直到你让潜意识成为意识，它将主导你的生活。", work: "《红书》", color: "#6B3FA0", colorName: "神秘紫", career: "适合心理、艺术、神话、塔罗、个人成长。你是“象征解读者”。", soul: "信“个人”外还有“集体”。对神话、梦境、象征有天然亲近。人生有“寻宝”质感。", weakness: "对“象征”敏感，有时脱离“现实”。太关心“意味什么”，忽略“这到底是什么”。", prescription: ["把“象征”放回“事物本身”。", "追求个体化时，记得和真实个体接触。", "成为完整的人，非完美。"], books: ["《红书》", "《千面英雄》"] },
  "纪伯伦": { tag: "温柔有力量 · 天生倾听者", quote: "你的孩子不是你的孩子。", work: "《先知》", color: "#C68E3C", colorName: "琥珀金", career: "适合心理、写作、艺术治疗。你是“语言的天平”。", soul: "语言有重量。用诗意眼睛看世界。对人类怀有不带占有欲的爱。靠活出来的轻盈和通透引路。", weakness: "用诗意解读世界，有时把残酷翻译太柔和。不擅长愤怒、拒绝、说“不”。", prescription: ["先把自己的杯子斟满。", "练习“不温柔的诚实”。", "把诗意收回书写自己。"], books: ["《先知》", "《当尼采哭泣》"] },
  "泰戈尔": { tag: "温柔直觉派 · 相信美好", quote: "世界对着它的爱人，揭下了浩瀚的面具。", work: "《飞鸟集》", color: "#E8D5D0", colorName: "晨雾粉", career: "适合教育、自然疗愈、艺术、儿童。你是“让一切变得柔和”的人。", soul: "用“美”理解世界。有惊人直觉，在一花一叶中看见宇宙。见过黑暗，但选择相信深处藏着光。", weakness: "柔软易被误解为软弱。世界用坚硬回应时，受伤害比预期大。易把别人情绪背在自己身上。", prescription: ["每天留段“不用回应任何人”的时间。", "把“世界变好”换成“让身边小角落变好”。", "练习说“我不同意”。"], books: ["《飞鸟集》", "《活山》"] },
  "鲁米": { tag: "炽热地爱 · 不设防", quote: "你生而有翼，为何却要爬行？", work: "《在春天走进果园》", color: "#D43D4A", colorName: "爱焰红", career: "适合亲密关系、诗歌、舞蹈、灵性。你是“爱的管道”。", soul: "信爱是通往一切的钥匙。有过“爱的觉醒”，从“活在头脑”变成“活在心里”。存在本身是邀请。", weakness: "“不设防”易受伤。爱敞开，伤害直接落在皮肤上。可能一次次被辜负，又一次次重新选择爱。", prescription: ["区分“无条件爱”和“无边界给予”。", "给出前问“能量够吗”。", "伤口是光进入的地方，但也需包扎。"], books: ["《在春天走进果园》", "《爱的艺术》"] },
  "里尔克": { tag: "极度耐心 · 深度沉思", quote: "学习去爱问题本身。", work: "《给一个青年诗人的信》", color: "#F5E6D3", colorName: "烛火白", career: "适合写作、艺术、深度研究。你是“酝酿者”。", soul: "“在黑暗中生长”的人。不急于找答案。相信困惑、延迟、不确定本身有意义。和问题共处。", weakness: "“耐心”易被误解为“拖延”。“爱问题”太久，可能错过“答案出现”时刻。有些问题用来解决。", prescription: ["给问题设定“解决期限”。", "区分“沉思”和“逃避”。", "去书写、体验、成为创作者。"], books: ["《给一个青年诗人的信》", "《里尔克诗选》"] },
  "博尔赫斯": { tag: "迷宫漫游者 · 相信可能性", quote: "天堂应该是图书馆的模样。", work: "《小径分岔的花园》", color: "#8B7355", colorName: "旧书褐", career: "适合写作、编辑、翻译、图书馆。你是“迷宫创造者”。", soul: "“迷宫漫游者”。喜欢绕弯的东西。对“确定”不感兴趣，对“可能性”着迷。世界是永远在读的书。", weakness: "对“可能”迷恋，难停留在“现实”。爱迷宫不是出口。可能在关系中保持“可进可退”。", prescription: ["选一条路走到底。", "在“无限延伸”和“停在一点”间选后者。", "上帝给了书籍和黑暗。"], books: ["《小径分岔的花园》", "《沙之书》"] },
  "黑塞": { tag: "分裂但渴望统一 · 深刻自省", quote: "每个人的内心深处都有一匹荒原狼。", work: "《荒原狼》", color: "#6A6A6A", colorName: "荒原灰", career: "适合小说、艺术治疗、跨文化。你是“内在和解者”。", soul: "身上有“狼”和“人”的战争。一面渴望融入，一面渴望野性。夹在两者间，一生是和解之路。", weakness: "“分裂”是最深痛苦，也是创造力来源。可能太习惯分裂，放弃“真正连接”的可能。", prescription: ["每周做件“纯狼”的事。", "也做件“纯人”的事。", "学会玩这场人生游戏，不是赢。"], books: ["《荒原狼》", "《德米安》"] },
  "阿伦特": { tag: "独立判断 · 不可收编", quote: "恶的平庸性，比恶本身更令人恐惧。", work: "《耶路撒冷的艾希曼》", color: "#F2F2F2", colorName: "独立白", career: "适合新闻、政治、法律、社会批判。你是“不可收编者”。", soul: "“不可收编”的人。不属于任何阵营。信思考是唯一抵抗——拒绝停止思考。对“人云亦云”深刻警惕。", weakness: "“不可收编”保持清醒，也难“放松归属”。永远在观察、评估、保持距离。很少完全信任群体。", prescription: ["找个可“不完全同意但依然属于”的社群。", "区分“独立思考”和“孤僻”。", "关心普通人如何不变成那样。"], books: ["《耶路撒冷的艾希曼》", "《人的境况》"] },
  "波伏娃": { tag: "反叛标签 · 自我创造", quote: "女人不是天生的，而是被塑造的。", work: "《第二性》", color: "#D44A5A", colorName: "女力红", career: "适合女性研究、文学、社会活动、教育。你是“自我创造者”。", soul: "拒绝“被定义”。对标签保持怀疑。信人是在选择中成为自己的。一生是不断“超越既定”。", weakness: "“拒绝被定义”强大，但有时也需“定义”歇脚。害怕被框住，从不入框，但框也是保护。", prescription: ["选个“临时定义”住三个月。", "区分“被定义”和“自我定义”。", "关系不需被定义也可存在。"], books: ["《第二性》", "《女宾》"] },

// ==========================================
// 4. 核心算法：数学归一化与余弦计算
// ==========================================
const DIMENSION_KEYS = ['D1', 'D2', 'D3', 'D4', 'D5', 'D6', 'D7', 'D8'];

function calculateRawVector(answers) {
    let raw = { D1: 0, D2: 0, D3: 0, D4: 0, D5: 0, D6: 0, D7: 0, D8: 0 };
    for (let qId in answers) {
        let choice = answers[qId];
        let mapping = QUESTION_MAPPING[qId]?.[choice];
        if (mapping) {
            for (let dim in mapping) raw[dim] += mapping[dim];
        }
    }
    return raw;
}

function normalizeVector(rawVector) {
    let normalized = {};
    let values = Object.values(rawVector);
    let minScore = Math.min(...values);
    let maxScore = Math.max(...values);
    
    for (let dim of DIMENSION_KEYS) {
        if (maxScore === minScore) {
            normalized[dim] = 5;
        } else {
            normalized[dim] = ((rawVector[dim] - minScore) / (maxScore - minScore)) * 10;
        }
    }
    return normalized;
}

function cosineSimilarity(vecA, vecB) {
    let dot = 0, normA = 0, normB = 0;
    const weights = { D1: 1.2, D2: 1.0, D3: 0.9, D4: 1.2, D5: 1.0, D6: 1.1, D7: 1.0, D8: 0.9 };
    
    for (let i = 0; i < DIMENSION_KEYS.length; i++) {
        let d = DIMENSION_KEYS[i];
        let w = weights[d];
        dot += w * vecA[i] * vecB[i];
        normA += w * Math.pow(vecA[i], 2);
        normB += w * Math.pow(vecB[i], 2);
    }
    if (normA === 0 || normB === 0) return 0;
    return dot / (Math.sqrt(normA) * Math.sqrt(normB));
}

function getFinalResult(answers) {
    let rawVector = calculateRawVector(answers);
    let finalUserVector = normalizeVector(rawVector);
    let userArray = DIMENSION_KEYS.map(k => finalUserVector[k]);
    let scores = [];
    
    for (let name in PHILOSOPHER_VECTORS) {
        let sim = cosineSimilarity(userArray, PHILOSOPHER_VECTORS[name]);
        scores.push({ name: name, score: sim });
    }
    scores.sort((a, b) => b.score - a.score);
    return { bestMatch: scores[0], userVector: finalUserVector };
}

// ==========================================
// 5. UI 渲染与状态管理
// ==========================================
const appDiv = document.getElementById('app');
let currentStep = 'welcome';
let currentQuestionIndex = 0;
let userAnswers = {};
let myChart = null;

function render() {
    if (currentStep === 'welcome') {
        appDiv.innerHTML = `
            <div class="card">
                <h1 class="title">50位思想家：寻找你的精神镜像</h1>
                <p class="subtitle">基于多维余弦映射算法，建立你的思想坐标系。<br>25道深度追问，匹配属于你的灵魂底色。</p>
                <button class="btn" onclick="startQuiz()">进入测试</button>
            </div>
        `;
    } else if (currentStep === 'quiz') {
        let q = QUESTIONS[currentQuestionIndex];
        let optionsHtml = q.options.map(opt => `
            <button class="option-btn" onclick="selectAnswer('${q.id}', '${opt.key}')">${opt.text}</button>
        `).join('');
        
        appDiv.innerHTML = `
            <div class="card">
                <div class="quiz-header">
                    <span>${q.section}</span>
                    <span>${currentQuestionIndex + 1} / ${QUESTIONS.length}</span>
                </div>
                <h2 class="question-text">${q.text}</h2>
                <div class="options-container">${optionsHtml}</div>
            </div>
        `;
    } else if (currentStep === 'result') {
        let resultData = getFinalResult(userAnswers);
        let match = resultData.bestMatch;
        let vector = resultData.userVector;
        let meta = PHILOSOPHER_META[match.name];
        let similarity = (match.score * 100).toFixed(1);
        
        // 动态改变背景色
        if(meta.color.includes('gradient')) {
            document.body.style.background = meta.color;
            document.body.style.color = '#1a1a1a';
        } else {
            document.body.style.backgroundColor = meta.color;
            const hex = meta.color.replace('#', '');
            const r = parseInt(hex.substr(0, 2), 16);
            const g = parseInt(hex.substr(2, 2), 16);
            const b = parseInt(hex.substr(4, 2), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            document.body.style.color = brightness > 150 ? '#1a1a1a' : '#f0f0f0';
        }

        appDiv.innerHTML = `
            <div class="card">
                <div class="result-tag">灵魂匹配度</div>
                <div class="match-score">${similarity}%</div>
                <div class="thinker-name">${match.name}</div>
                <div class="thinker-tag">「 ${meta.tag} 」</div>
                <div style="text-align:center;"><span class="color-badge" style="background:${meta.color}; color:${document.body.style.color === 'rgb(26, 26, 26)' ? '#1a1a1a' : '#fff'}">${meta.colorName} ${meta.color.includes('gradient')?'':meta.color}</span></div>
                
                <div class="quote">“${meta.quote}”</div>
                
                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>

                <div class="section">
                    <div class="section-title">人生规划</div>
                    <div class="section-content">${meta.career}</div>
                </div>
                
                <div class="section">
                    <div class="section-title">灵魂素描</div>
                    <div class="section-content">${meta.soul}</div>
                </div>

                <div class="section">
                    <div class="section-title">隐秘软肋</div>
                    <div class="section-content">${meta.weakness}</div>
                </div>

                <div class="section">
                    <div class="section-title">存在处方</div>
                    ${meta.prescription.map(p => `<div class="list-item">${p}</div>`).join('')}
                </div>

                <div class="section">
                    <div class="section-title">精神食粮</div>
                    ${meta.books.map(b => `<div class="list-item">${b}</div>`).join('')}
                </div>
                
                <button class="btn" onclick="restart()">重新测算</button>
            </div>
        `;
        
        setTimeout(() => drawRadarChart(vector), 100);
    }
}

function drawRadarChart(vector) {
    const ctx = document.getElementById('radarChart').getContext('2d');
    if (myChart) myChart.destroy();
    
    const isDark = document.body.style.color === 'rgb(240, 240, 240)' || document.body.style.color === '#f0f0f0';
    const gridColor = isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.1)';
    const textColor = isDark ? '#ccc' : '#555';
    const lineColor = isDark ? 'rgba(255, 255, 255, 0.8)' : 'rgba(34, 34, 34, 0.8)';
    
    myChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['理性', '理想', '行动', '个体', '情感', '批判', '存在', '共情'],
            datasets: [{
                label: '你的思想坐标',
                data: [vector.D1, vector.D2, vector.D3, vector.D4, vector.D5, vector.D6, vector.D7, vector.D8],
                backgroundColor: isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(34, 34, 34, 0.1)',
                borderColor: lineColor,
                pointBackgroundColor: lineColor,
                pointBorderColor: isDark ? '#1a1a1a' : '#fff',
                borderWidth: 2,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                r: {
                    angleLines: { color: gridColor },
                    grid: { color: gridColor },
                    pointLabels: { font: { size: 12, weight: 'bold' }, color: textColor },
                    ticks: { display: false, min: 0, max: 10, stepSize: 2 }
                }
            },
            plugins: {
                legend: { display: false },
                tooltip: { backgroundColor: isDark ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.8)', titleColor: isDark ? '#1a1a1a' : '#fff', bodyColor: isDark ? '#1a1a1a' : '#fff' }
            }
        }
    });
}

function startQuiz() {
    currentQuestionIndex = 0;
    userAnswers = {};
    currentStep = 'quiz';
    render();
}

function selectAnswer(qId, choiceKey) {
    userAnswers[qId] = choiceKey;
    if (currentQuestionIndex < QUESTIONS.length - 1) {
        currentQuestionIndex++;
        render();
    } else {
        currentStep = 'result';
        render();
    }
}

function restart() {
    document.body.style.backgroundColor = '#1a1a1a';
    document.body.style.color = '#f0f0f0';
    currentStep = 'welcome';
    render();
}

// 初始化
render();
</script>
